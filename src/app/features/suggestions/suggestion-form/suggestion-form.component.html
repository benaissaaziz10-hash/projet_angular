<div class="form-container">
  <h2>{{ isEditMode ? '✏️ Modifier la Suggestion' : '➕ Ajouter une Suggestion' }}</h2>

  <form [formGroup]="suggestionForm" (ngSubmit)="onSubmit()">

    <!-- Title -->
    <div class="form-group">
      <label>TITRE :</label>
      <input 
        type="text" 
        formControlName="title"    
        class="form-control"
      />
      <span class="error" *ngIf="suggestionForm.get('title')?.invalid && suggestionForm.get('title')?.touched">
        Le titre est obligatoire (min 5 caractères, commence par majuscule)
      </span>
    </div>

    <!-- Description -->
    <div class="form-group">
      <label>DESCRIPTION :</label>
      <textarea 
        formControlName="description"  
        class="form-control"
        rows="4"
      ></textarea>
      <span class="error" *ngIf="suggestionForm.get('description')?.invalid && suggestionForm.get('description')?.touched">
        La description est obligatoire (min 30 caractères)
      </span>
    </div>

    <!-- Category -->
    <div class="form-group">
      <label>CATÉGORIE :</label>
      <select formControlName="category" class="form-control">
        <option value="">-- Choisir une catégorie --</option>
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>
      <span class="error" *ngIf="suggestionForm.get('category')?.invalid && suggestionForm.get('category')?.touched">
        La catégorie est obligatoire
      </span>
    </div>

    <!-- Date -->
    <div class="form-group">
      <label>DATE :</label>
      <input 
        type="text" 
        formControlName="date"   
        class="form-control"
      />
    </div>

    <!-- Status -->
    <div class="form-group">
      <label>STATUS :</label>
      <input 
        type="text" 
        formControlName="status"  
        class="form-control"
      />
    </div>

    <!-- Buttons -->
    <div class="form-actions">
      <button 
        type="submit" 
        class="btn btn-save"
        [disabled]="suggestionForm.invalid"
      >
        💾 Soumettre
      </button>
      <button 
        type="button" 
        class="btn btn-cancel"
        (click)="router.navigate(['../'], { relativeTo: actR })"
      >
        ❌ Annuler
      </button>
    </div>

  </form>
</div>
