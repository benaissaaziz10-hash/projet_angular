<div class="form-container">
  <form [formGroup]="suggestionForm" (ngSubmit)="onSubmit()">

    <!-- Titre -->
    <div class="form-group">
      <label>Titre :</label>
      <input type="text" formControlName="title" class="form-control"/>
      <div *ngIf="suggestionForm.get('title')?.invalid && suggestionForm.get('title')?.touched">
        <small *ngIf="suggestionForm.get('title')?.errors?.['required']" class="error">
          Le titre est obligatoire.
        </small>
        <small *ngIf="suggestionForm.get('title')?.errors?.['minlength']" class="error">
          Le titre doit contenir au minimum 5 caractères.
        </small>
        <small *ngIf="suggestionForm.get('title')?.errors?.['pattern']" class="error">
          Le titre doit commencer par une majuscule et ne contenir que des lettres.
        </small>
      </div>
    </div>

    <div class="form-group">
      <label>Description :</label>
      <textarea formControlName="description" class="form-control" rows="4"></textarea>
      <div *ngIf="suggestionForm.get('description')?.invalid && suggestionForm.get('description')?.touched">
        <small *ngIf="suggestionForm.get('description')?.errors?.['required']" class="error">
          La description est obligatoire.
        </small>
        <small *ngIf="suggestionForm.get('description')?.errors?.['minlength']" class="error">
          La description doit contenir au minimum 30 caractères.
        </small>
      </div>
    </div>

    <div class="form-group">
      <label>Catégorie :</label>
      <select formControlName="category" class="form-control">
        <option value="">-- Sélectionnez une catégorie --</option>
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>
      <div *ngIf="suggestionForm.get('category')?.invalid && suggestionForm.get('category')?.touched">
        <small class="error">La catégorie est obligatoire.</small>
      </div>
    </div>

    <div class="form-group">
      <label>Date :</label>
      <input type="text" formControlName="date" class="form-control" readonly/>
    </div>

    <div class="form-group">
      <label>Status :</label>
      <input type="text" formControlName="status" class="form-control" readonly/>
    </div>

    <button 
      type="submit" 
      class="btn btn-submit"
      [disabled]="suggestionForm.invalid">
      Soumettre
    </button>

  </form>
</div>
